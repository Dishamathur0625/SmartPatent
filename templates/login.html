{% extends "layout.html" %}

{% block content %}
<div class="auth-container" style="max-width: 450px; margin: 60px auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 20px;">Login</h2>
        
        {% if error %}
            <div style="background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.25); padding: 12px; border-radius: 8px; font-weight: 500; font-size: 0.9rem; margin-bottom: 20px; text-align: center;">
                {{ error }}
            </div>
        {% endif %}

        {% if success %}
            <div style="background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); padding: 12px; border-radius: 8px; font-weight: 500; font-size: 0.9rem; margin-bottom: 20px; text-align: center;">
                {{ success }}
            </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@domain.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter password">
            </div>

            <button type="submit" class="btn" style="width: 100%; padding: 12px; margin-top: 10px;">Sign In</button>
        </form>

        <div style="text-align: center; margin-top: 15px; font-size: 0.85rem;">
            <a href="/forgot_password" style="color: var(--text-muted);">Forgot password?</a>
        </div>

        <div style="text-align: center; margin-top: 15px; font-size: 0.9rem; border-top: 1px solid var(--border-color); padding-top: 15px;">
            <span style="color: var(--text-secondary);">New to SmartPatent?</span> 
            <a href="/signup" style="font-weight: 600;">Create account</a>
        </div>
    </div>
</div>
{% endblock %}
