{% extends "layout.html" %}

{% block content %}
<div class="auth-container" style="max-width: 450px; margin: 60px auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 20px;">Reset Password</h2>
        
        {% if error %}
            <div style="background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.25); padding: 12px; border-radius: 8px; font-weight: 500; font-size: 0.9rem; margin-bottom: 20px; text-align: center;">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" required placeholder="At least 8 characters">
            </div>

            <button type="submit" class="btn" style="width: 100%; padding: 12px; margin-top: 10px;">Save New Password</button>
        </form>
    </div>
</div>
{% endblock %}
