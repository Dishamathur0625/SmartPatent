<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPatent - Professional AI Patent Architect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</head>
<body>

<nav>
    <a href="/" class="logo">SmartPatent</a>
    <div class="nav-links">
        {% if session.get('user_id') %}
            <span class="user-greeting" style="margin-right: 20px; color: var(--text-secondary); font-weight: 500;">
                Welcome, <strong>{{ session.get('user_name') }}</strong>
            </span>
            <a href="/dashboard" class="btn secondary" style="margin-right: 10px;">Dashboard</a>
            <a href="/logout" class="btn danger" style="padding: 8px 16px;">Logout</a>
        {% else %}
            <a href="/login" class="btn secondary" style="margin-right: 10px;">Login</a>
            <a href="/signup" class="btn">Sign Up</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
